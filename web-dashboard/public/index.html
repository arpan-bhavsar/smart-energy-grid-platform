<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Smart Energy Meter Dashboard</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top, #16333b, #132a34);
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 { margin-top: 40px; }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 40px 0;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      width: 220px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .label { font-weight: 500; margin-bottom: 10px; }
    .value { font-size: 24px; font-weight: bold; color: #f3c623; }

    input[type="number"] {
      padding: 8px;
      width: 120px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      text-align: center;
    }
    button {
      background: #f3c623;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ffdb4d;
    }

    .toggle-container { margin-top: 20px; }
    .toggle { position: relative; display: inline-block; width: 60px; height: 34px; }
    .toggle input { display: none; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #d9534f;
      transition: 0.4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: "";
      height: 26px; width: 26px; left: 4px; bottom: 4px;
      background-color: white; transition: 0.4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #5cb85c; }
    input:checked + .slider:before { transform: translateX(26px); }

    #status { font-weight: bold; margin-top: 10px; }

    #limitStatus {
      font-size: 14px;
      margin-top: 10px;
      color: #ffd966;
      font-weight: 500;
    }

    #chartBox {
      width: 90%;
      margin: 50px auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h1>⚡ Smart Energy Meter Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div class="label">Current (A)</div>
      <div id="current" class="value">--</div>
    </div>
    <div class="card">
      <div class="label">Power (W)</div>
      <div id="power" class="value">--</div>
    </div>
    <div class="card">
      <div class="label">Energy (kWh)</div>
      <div id="energy" class="value">--</div>
    </div>
    <!-- <div class="card">
      <div class="label">Estimated Bill (₹)</div>
      <div id="bill" class="value">--</div>
    </div> -->
    <div class="card">
      <h3>Total Bill</h3>
      <p id="totalBill" class="value">₹0.00</p>
    </div>
    <div class="card">
      <h3>Set Bill Limit</h3>
      <input type="number" id="billLimitInput" placeholder="Enter ₹ limit">
      <button onclick="setBillLimit()">Set Limit</button>
      <p id="limitStatus" style="color:#f3c623; font-weight:bold;"></p>

    </div>
  </div>

  <div class="toggle-container">
    <label>Load Control</label>
    <label class="toggle">
      <input type="checkbox" id="relayToggle">
      <span class="slider"></span>
    </label>
    <div id="status">Status: OFF</div>
  </div>

  <div id="chartBox" style="
  background: rgba(25, 25, 25, 0.85);
  border-radius: 20px;
  padding: 30px;
  margin: 60px auto;
  max-width: 800px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
  text-align: center;">
  
  <h2 style="color:#fff; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">
    Live Power Consumption
  </h2>

  <div style="display:flex; justify-content:center; gap:2rem; color:#fff; margin-bottom:1rem;">
    <div><strong id="minPing">--</strong><br><small>MIN</small></div>
    <div><strong id="avgPing">--</strong><br><small>AVG</small></div>
    <div><strong id="maxPing">--</strong><br><small>MAX</small></div>
  </div>

  <canvas id="powerChart" height="200"></canvas>
  <p style="font-size:0.9rem; color:rgba(255,255,255,0.6); margin-top:1rem;">
    Actual power usage might vary.
  </p>
</div>


  <!-- Chart.js + Firebase -->
   
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
